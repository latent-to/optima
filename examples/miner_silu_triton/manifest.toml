# Example miner submission targeting the activation.silu_and_mul slot with a
# Triton kernel. This is DATA the validator reads; the kernel source lives under
# kernels/ and is compiled/run by the validator, never shipped as a binary.

bundle_id = "example-silu-triton-v1"
abi_version = "optima-op-abi-v0"

[[ops]]
slot = "activation.silu_and_mul"
source = "kernels/silu_and_mul.py"
entry = "silu_and_mul"
dtypes = ["bfloat16", "float16"]
architectures = ["sm80", "sm86", "sm89", "sm90", "sm100", "sm103"]
metadata = "metadata/silu_and_mul.json"
