      - Target and slot contract: architecture/slot-contract.md
      - Evaluation and release stacks: architecture/stacks.md
      - Sealed direct artifacts: architecture/direct-artifacts.md
      - Runtime injection seam: architecture/seam.md
      - Release architecture: architecture/releases.md
  - Miner guide:
      - Overview: miner-guide/overview.md
      - Your first kernel: miner-guide/your-first-kernel.md
      - Choose a target: miner-guide/slots.md
      - Bundle format: miner-guide/bundle-format.md
      - Kernel ABI and variants: miner-guide/kernel-abi.md
      - Graph correctness: miner-guide/graph-safety.md
      - Finding an improvement: miner-guide/finding-a-win.md
      - Example bundles: miner-guide/examples.md
      - Submit on-chain: miner-guide/submitting.md
      - Troubleshooting: miner-guide/diagnostics.md
      - Discovery lane: miner-guide/discovery-lane.md
      - Incentives: miner-guide/incentives.md
      - Override points: miner-guide/override-points.md
      - Dependency patches: miner-guide/dep-patches.md
  - Validator guide:
      - Overview: validator-guide/overview.md
      - Deployment readiness: validator-guide/first-hour.md
      - Arena service: validator-guide/arena-service.md
      - Finalized intake: validator-guide/chain-loop.md
      - Qualification: validator-guide/qualification.md
      - Scoring: validator-guide/scoring.md
      - Fidelity and pristine T: validator-guide/fidelity.md
      - Settlement and weights: validator-guide/settlement-and-weights.md
      - Release operations: validator-guide/releases.md
