site_name: Optima
site_description: >-
  Engineering documentation for Optima's contribution, evaluation, settlement,
  and release systems.
site_url: https://latent-to.github.io/cacheon/
docs_dir: docs
site_dir: site
# Developer-private operational notes can exist in a local checkout but are
# never part of the published documentation source set.
exclude_docs: |
  WORKLOG.md
# These pages preserve paths embedded in content-addressed release or example
# inputs. Their bodies are checker-validated links, never duplicate guidance.
not_in_nav: |
  DEV_ENVIRONMENT.md
  EMISSIONS_POLICY.md
  FIDELITY.md
  GPU_SETUP.md
  HOW_OPTIMA_WORKS.md
  INCENTIVES.md
  INCENTIVE_LOAD_VALIDATION.md
  MINER_GUIDE.md
  PRODUCT_CONTRACT.md
  REFEREE_HARDENING_AUDIT.md
  REFEREE_HARDENING_DONOR_MAP.md
  REFEREE_HARDENING_SPLIT_PLAN.md
  SGLANG_TRACKING.md
  SLOT_CONTRACT.md
  STATE_OF_RECORD.md
  SUBMISSION_MODEL.md
  SUBMISSION_MODEL_BUILD_SPEC.md
  SUBMISSION_TERMS.md
  SUBNET_BLUEPRINT.md
  TESTNET.md

repo_url: https://github.com/latent-to/cacheon
repo_name: latent-to/cacheon
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  logo: assets/images/optima-mark.svg
  favicon: assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

plugins:
  - search

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10.9.1/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/latent-to/cacheon
      name: Optima source code

copyright: Optima contributors

nav:
