<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Optima · GPU Profile Report</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2230; --border:#30363d;
    --fg:#e6edf3; --muted:#8b949e; --accent:#58a6ff;
    --green:#3fb950; --red:#f85149; --amber:#d29922; --purple:#bc8cff; --pink:#db61a2;
    --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
  a{color:var(--accent);text-decoration:none}
  header{padding:22px 26px;border-bottom:1px solid var(--border);
    background:linear-gradient(180deg,#11161f,#0d1117)}
  header h1{margin:0 0 6px;font-size:20px;letter-spacing:.2px}
  header h1 .tag{color:var(--muted);font-weight:400;font-size:14px}
  .headline{color:var(--fg);background:var(--panel);border:1px solid var(--border);
    border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-top:12px;max-width:1100px}
  nav{position:sticky;top:0;z-index:5;display:flex;gap:4px;flex-wrap:wrap;
    padding:8px 18px;background:#0d1117ee;backdrop-filter:blur(6px);border-bottom:1px solid var(--border)}
  nav a{padding:5px 11px;border-radius:6px;color:var(--muted);font-size:13px}
  nav a:hover{background:var(--panel);color:var(--fg)}
  main{padding:8px 26px 80px;max-width:1280px}
  section{margin:30px 0}
  h2{font-size:16px;border-bottom:1px solid var(--border);padding-bottom:6px;margin:0 0 14px}
  h2 .sub{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px}
  .grid{display:grid;gap:12px}
  .cards{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px 14px}
  .card.win{border-left:3px solid var(--green)} .card.unk{border-left:3px solid var(--muted)}
  .card h3{margin:0 0 6px;font-size:13.5px} .card p{margin:4px 0;color:var(--muted);font-size:12.5px}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;font-family:var(--mono)}
  .pill.green{background:#1f3a26;color:var(--green)} .pill.red{background:#3a1f1f;color:var(--red)}
  .pill.amber{background:#3a311a;color:var(--amber)} .pill.gray{background:#23282f;color:var(--muted)}
  .pill.purple{background:#2c2440;color:var(--purple)} .pill.pink{background:#3a2030;color:var(--pink)}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  th,td{text-align:left;padding:6px 9px;border-bottom:1px solid var(--border);white-space:nowrap}
  th{color:var(--muted);font-weight:600;cursor:pointer;user-select:none;position:sticky;top:0;background:var(--panel)}
  th:hover{color:var(--fg)}
  td.num,th.num{text-align:right;font-family:var(--mono)}
  td.kn{font-family:var(--mono);font-size:11.5px;max-width:560px;overflow:hidden;text-overflow:ellipsis}
  tr:hover td{background:#12161d}
  .tablewrap{max-height:520px;overflow:auto;border:1px solid var(--border);border-radius:8px}
  .bar{height:18px;border-radius:3px;display:inline-block;vertical-align:middle}
  .amdahl{display:flex;height:34px;border-radius:6px;overflow:hidden;border:1px solid var(--border);margin:6px 0}
  .amdahl > div{display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:600;color:#0d1117}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 0;font-size:12px;color:var(--muted)}
  .legend span{display:inline-flex;align-items:center;gap:5px}
  .swatch{width:11px;height:11px;border-radius:2px;display:inline-block}
  input.search{width:320px;max-width:100%;padding:7px 10px;background:var(--panel);border:1px solid var(--border);
    border-radius:6px;color:var(--fg);font-size:13px;margin-bottom:8px}
  .note{color:var(--muted);font-size:12px;margin:4px 0}
  .warn{border-left:3px solid var(--amber);background:#1d1a12;padding:8px 12px;border-radius:6px;margin:6px 0;font-size:12.5px}
  .muted{color:var(--muted)} .mono{font-family:var(--mono)}
  svg text{fill:var(--muted);font-size:11px}
  .chartwrap{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:12px}
  footer{color:var(--muted);font-size:11.5px;padding:20px 26px;border-top:1px solid var(--border)}
</style>
</head>
<body>
<script id="payload" type="application/json">__PROFILER_PAYLOAD__</script>
<header>
  <h1>Optima · GPU Profile Report <span class="tag" id="datadir"></span></h1>
  <div class="headline" id="headline"></div>
</header>
<nav id="nav"></nav>
<main id="main"></main>
<footer>Generated by <span class="mono">tools/profiler</span> — stdlib ingest · zero-dependency self-contained report.
  All numbers derived from the raw artifacts in the dataset; thresholds are explicit and editable in <span class="mono">findings.py</span>.</footer>

<script>
const PAYLOAD = JSON.parse(document.getElementById('payload').textContent);
const D = PAYLOAD.dataset, F = PAYLOAD.findings;
const DISPLAY = D.display || {};

// ---------- tiny DOM helper ----------
function el(tag, attrs={}, kids=[]){
  const e=document.createElement(tag);
  for(const[k,v]of Object.entries(attrs)){
    if(k==='class')e.className=v; else if(k==='html')e.innerHTML=v;
    else if(k==='text')e.textContent=v; else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);
    else e.setAttribute(k,v);
  }
  (Array.isArray(kids)?kids:[kids]).forEach(c=>{if(c==null)return;
    e.appendChild(typeof c==='string'?document.createTextNode(c):c)});
  return e;
}
const fmt=(n,d=1)=>n==null||isNaN(n)?'—':Number(n).toLocaleString('en',{maximumFractionDigits:d,minimumFractionDigits:d});
const fmt0=n=>n==null?'—':Math.round(n).toLocaleString('en');
const BOUND_COLOR={memory:'red',compute:'pink',latency:'green',mixed:'amber',cluster:'red',unknown:'gray'};
const WIN_COLOR=w=>w===true?'green':w===false?'red':'gray';
const CSS={green:'#3fb950',red:'#f85149',amber:'#d29922',gray:'#8b949e',purple:'#bc8cff',pink:'#db61a2',accent:'#58a6ff'};

const main=document.getElementById('main');
document.getElementById('datadir').textContent = '· '+(D.meta?.datadir||'');
document.getElementById('headline').textContent = F.headline||'';

const SECTIONS=[];
function section(id,title,sub){const s=el('section',{id});
  s.appendChild(el('h2',{},[title, sub?el('span',{class:'sub',text:sub}):null]));
  main.appendChild(s); SECTIONS.push([id,title]); return s;}

// ===================== FINDINGS =====================
(function(){
  const s=section('findings','Findings','derived: decode share × ncu bound-type → Amdahl-bounded win');
  const a=F.amdahl||{};
  s.appendChild(el('div',{class:'note',text:'Decode kernel-time split by winnability (canonical trace: '
    +(F.decode_canonical?.label||'?')+' '+(F.decode_canonical?.rank||'')+'):'}));
  const tot=Math.max(1,(a.winnable_pct||0)+(a.floor_pct||0)+(a.unknown_pct||0));
  const bar=el('div',{class:'amdahl'});
  [['winnable',a.winnable_pct,CSS.green],['floor',a.floor_pct,CSS.red],['unknown',a.unknown_pct,CSS.gray]]
    .forEach(([lab,v,c])=>{if(!v)return;
      bar.appendChild(el('div',{style:`width:${100*v/tot}%;background:${c}`,
        text:`${lab} ${fmt(v,0)}%`}));});
  s.appendChild(bar);
  s.appendChild(el('div',{class:'note muted',text:a.assumptions||''}));
  s.appendChild(el('div',{class:'note',html:`<b>Amdahl ceiling:</b> even if every winnable kernel vanished, max decode speedup = `
    +`<span class="mono">${fmt(a.max_decode_speedup_if_winnable_eliminated,2)}×</span>. `
    +`Realistic decode gain ≈ <span class="mono">${fmt(a.realistic_decode_gain_pct,1)}%</span>.`}));

  if((F.constraints||[]).length){
    s.appendChild(el('h3',{style:'margin:16px 0 6px;font-size:13.5px',text:'Hard constraints'}));
    F.constraints.forEach(c=>s.appendChild(el('div',{class:'warn',text:c})));
  }
  s.appendChild(el('h3',{style:'margin:16px 0 6px;font-size:13.5px',text:'Ranked opportunities'}));
  const cards=el('div',{class:'grid cards'});
  (F.opportunities||[]).forEach(o=>{
    const win=o.est_decode_gain_pct!=null;
    cards.appendChild(el('div',{class:'card '+(win?'win':'unk')},[
      el('h3',{text:o.title}),
      el('p',{html:win?`est. <b>+${fmt(o.est_decode_gain_pct,1)}%</b> decode`:`<span class="pill gray">PROFILE</span> bound-type unknown`}),
      el('p',{text:o.evidence}),
      el('p',{class:'muted',text:'→ '+o.action}),
    ]));
  });
  s.appendChild(cards);
})();

// ===================== E2E SWEEP =====================
(function(){
  const sweeps=(D.e2e||[]).filter(r=>r.kind==='sweep');
  if(!sweeps.length)return;
  const s=section('e2e','E2E throughput','serve_load2 steady tok/s vs concurrency');
  const byCfg={}; sweeps.forEach(r=>{(byCfg[r.config]=byCfg[r.config]||[]).push(r);});
  const concs=[...new Set(sweeps.map(r=>r.conc))].sort((a,b)=>a-b);
  const maxY=Math.max(...sweeps.map(r=>r.agg_toks))*1.08;
  const W=720,H=300,P={l:54,r:16,t:14,b:34};
  const colors=[CSS.accent,CSS.purple,CSS.red,CSS.amber,CSS.green,CSS.pink];
  const xpos=i=>P.l+(W-P.l-P.r)*(concs.length<2?0.5:i/(concs.length-1));
  const ypos=v=>H-P.b-(H-P.t-P.b)*(v/maxY);
  const NS='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(NS,'svg'); svg.setAttribute('viewBox',`0 0 ${W} ${H}`); svg.setAttribute('width','100%');
  const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
  // gridlines + y labels
  for(let g=0;g<=4;g++){const v=maxY*g/4,y=ypos(v);
    svg.appendChild(mk('line',{x1:P.l,x2:W-P.r,y1:y,y2:y,stroke:'#30363d','stroke-width':g?0.5:1}));
    const t=mk('text',{x:P.l-8,y:y+3,'text-anchor':'end'});t.textContent=fmt0(v);svg.appendChild(t);}
  concs.forEach((c,i)=>{const t=mk('text',{x:xpos(i),y:H-P.b+16,'text-anchor':'middle'});t.textContent='c'+c;svg.appendChild(t);});
  const legend=el('div',{class:'legend'});
  Object.entries(byCfg).forEach(([cfg,rows],ci)=>{
    const col=colors[ci%colors.length];
    rows.sort((a,b)=>a.conc-b.conc);
    let dpath='';
    rows.forEach((r,j)=>{const x=xpos(concs.indexOf(r.conc)),y=ypos(r.agg_toks);
      dpath+=(j?'L':'M')+x+' '+y+' ';
      const c=mk('circle',{cx:x,cy:y,r:3,fill:col}); c.appendChild(mk('title',{}));
      c.lastChild.textContent=`${cfg} c${r.conc}: ${fmt0(r.agg_toks)} tok/s`; svg.appendChild(c);});
    svg.appendChild(mk('path',{d:dpath,fill:'none',stroke:col,'stroke-width':2}));
    legend.appendChild(el('span',{},[el('span',{class:'swatch',style:`background:${col}`}),cfg]));
  });
  const wrap=el('div',{class:'chartwrap'}); wrap.appendChild(svg); wrap.appendChild(legend);
  s.appendChild(wrap);
  // table
  const tw=el('div',{class:'tablewrap',style:'margin-top:12px'});
  const head=['config','conc','agg tok/s','per-stream','TTFT p50/p99 s','decode p50','tok/chunk','errors'];
  const tbl=el('table'); tbl.appendChild(el('tr',{},head.map((h,i)=>el('th',{class:i>1?'num':'',text:h}))));
  sweeps.sort((a,b)=>a.config.localeCompare(b.config)||a.conc-b.conc).forEach(r=>{
    tbl.appendChild(el('tr',{},[
      el('td',{text:r.config}),el('td',{class:'num',text:r.conc}),
      el('td',{class:'num',text:fmt0(r.agg_toks)}),el('td',{class:'num',text:fmt(r.agg_toks/r.conc,1)}),
      el('td',{class:'num',text:fmt(r.ttft_p50,2)+'/'+fmt(r.ttft_p99,2)}),
      el('td',{class:'num',text:fmt(r.decode_p50,1)}),el('td',{class:'num',text:fmt(r.tokens_per_chunk,2)}),
      el('td',{class:'num',text:r.errors}),
    ]));
  });
  tw.appendChild(tbl); s.appendChild(tw);
})();

// ===================== DECODE BREAKDOWN =====================
(function(){
  const c=F.decode_canonical; if(!c||!c.categories?.length)return;
  const s=section('decode','Decode breakdown','% of decode kernel time, colored by ncu verdict');
  s.appendChild(legend([['Winnable (fuse)',CSS.green],['Vendor floor',CSS.red],['Unknown (profile)',CSS.gray],['Mixed',CSS.amber]]));
  const maxP=Math.max(...c.categories.map(x=>x.pct));
  const tbl=el('table');
  c.categories.forEach(e=>{
    const col=CSS[WIN_COLOR(e.winnable)];
    const n=e.ncu;
    tbl.appendChild(el('tr',{},[
      el('td',{style:'min-width:200px',text:e.display}),
      el('td',{class:'num',text:fmt(e.pct,1)+'%'}),
      el('td',{style:'width:46%'},[el('span',{class:'bar',style:`width:${100*e.pct/maxP}%;background:${col}`})]),
      el('td',{},[el('span',{class:'pill '+BOUND_COLOR[e.bound_type],text:e.bound_type})]),
      el('td',{class:'mono muted',style:'font-size:11px',
        text:n?`comp ${fmt(n.comp,0)} · mem ${fmt(n.mem,0)} · dram ${fmt(n.dram,0)} · occ ${fmt(n.occ,0)} · w ${fmt(n.waves,2)}`:''}),
    ]));
    tbl.appendChild(el('tr',{},[el('td',{colspan:5,class:'muted',style:'font-size:11.5px;padding-top:0',text:'↳ '+e.verdict})]));
  });
  s.appendChild(el('div',{class:'tablewrap'},[tbl]));
  s.appendChild(el('div',{class:'note muted',text:'Source: '+(c.file||'')+'  ·  total decode kernel time '+fmt(c.total_us/1000,2)+' ms/step.'}));
})();

// ===================== NCU BOUND-TYPES =====================
(function(){
  if(!(D.ncu||[]).length)return;
  const s=section('ncu','NCU bound-types','per-kernel hardware-counter verdicts (TP=1)');
  D.ncu.forEach(cap=>{
    const title=el('h3',{style:'margin:14px 0 4px;font-size:13.5px'},[
      cap.label+' ', el('span',{class:'pill gray',text:cap.n_valid+'/'+cap.n_kernels+' valid'}),
      cap.all_nan?el('span',{class:'pill red',text:' all-NaN (cluster/CLC — uncountable)'}):null,
    ]);
    s.appendChild(title);
    if(cap.all_nan){s.appendChild(el('div',{class:'note muted',
      text:'ncu kernel-replay could not count this capture (thread-block-cluster / Cluster-Launch-Control). Excluded from verdicts.'}));return;}
    const head=['kernel','dur µs','comp%','mem%','dram%','occ%','waves','bound','verdict'];
    const tbl=el('table'); tbl.appendChild(el('tr',{},head.map((h,i)=>el('th',{class:i&&i<7?'num':'',text:h}))));
    cap.kernels.filter(k=>k.valid).sort((a,b)=>(b.dur_us||0)-(a.dur_us||0)).forEach(k=>{
      const bt=boundOf(k);
      tbl.appendChild(el('tr',{},[
        el('td',{class:'kn',text:k.kernel}),
        el('td',{class:'num',text:fmt(k.dur_us,1)}),el('td',{class:'num',text:fmt(k.comp,0)}),
        el('td',{class:'num',text:fmt(k.mem,0)}),el('td',{class:'num',text:fmt(k.dram,0)}),
        el('td',{class:'num',text:fmt(k.occ,0)}),el('td',{class:'num',text:fmt(k.waves,2)}),
        el('td',{},[el('span',{class:'pill '+BOUND_COLOR[bt.type],text:bt.type})]),
        el('td',{class:'muted',style:'white-space:normal;max-width:380px;font-size:11.5px',text:bt.text}),
      ]));
    });
    s.appendChild(el('div',{class:'tablewrap'},[tbl]));
  });
})();

// ===================== KERNEL EXPLORER =====================
(function(){
  const rows=[];
  (D.decode||[]).forEach(t=>(t.top_kernels||[]).forEach(k=>rows.push(
    {src:t.label+'/'+t.rank, cat:k.cat, name:k.name, pct:k.pct, ms:k.us/1000, count:k.count})));
  (D.nsys||[]).forEach(t=>(t.top_kernels||[]).forEach(k=>rows.push(
    {src:'nsys:'+t.file.replace('_kernsum.txt',''), cat:k.cat, name:k.name, pct:k.share, ms:null, count:k.count})));
  if(!rows.length)return;
  const s=section('kernels','Kernel explorer','search/sort every top kernel across traces');
  const box=el('input',{class:'search',type:'text',placeholder:'filter by kernel name or category…'});
  s.appendChild(box);
  const tw=el('div',{class:'tablewrap'}); const tbl=el('table'); tw.appendChild(tbl); s.appendChild(tw);
  let sortKey='pct',sortDir=-1;
  const head=[['source','src',0],['category','cat',0],['kernel','name',0],['share %','pct',1],['ms','ms',1],['launches','count',1]];
  function draw(){
    const q=box.value.toLowerCase();
    const data=rows.filter(r=>!q||r.name.toLowerCase().includes(q)||(DISPLAY[r.cat]||r.cat).toLowerCase().includes(q))
      .sort((a,b)=>{const x=a[sortKey],y=b[sortKey];return ((x==null?-1:x)>(y==null?-1:y)?1:-1)*sortDir;});
    tbl.innerHTML='';
    tbl.appendChild(el('tr',{},head.map(([lab,key,num])=>el('th',{class:num?'num':'',
      onclick:()=>{sortDir=sortKey===key?-sortDir:-1;sortKey=key;draw();},
      text:lab+(sortKey===key?(sortDir<0?' ↓':' ↑'):'')}))));
    data.slice(0,400).forEach(r=>tbl.appendChild(el('tr',{},[
      el('td',{class:'muted',text:r.src}),
      el('td',{},[el('span',{class:'pill '+BOUND_COLOR[boundCat(r.cat)],text:DISPLAY[r.cat]||r.cat})]),
      el('td',{class:'kn',text:r.name}),
      el('td',{class:'num',text:fmt(r.pct,2)}),
      el('td',{class:'num',text:r.ms==null?'—':fmt(r.ms,2)}),
      el('td',{class:'num',text:fmt0(r.count)}),
    ])));
    if(data.length>400)tbl.appendChild(el('tr',{},[el('td',{colspan:6,class:'muted',text:`… ${data.length-400} more (refine the filter)`})]));
  }
  box.addEventListener('input',draw); draw();
})();

// ===================== LEVERS =====================
(function(){
  const L=F.levers||{}; const s=section('levers','Config levers','A/B knobs measured at e2e');
  if(L.cuda_graph){
    s.appendChild(el('div',{class:'card',style:'margin-bottom:10px'},[
      el('h3',{html:`CUDA graph: <span class="mono" style="color:var(--red)">${fmt(L.cuda_graph.serving_speedup,2)}×</span> at serving conc${L.cuda_graph.serving_conc} `
        +`<span class="muted">(up to ${fmt(L.cuda_graph.max_speedup,2)}× at conc1)</span>`}),
      el('p',{class:'muted',text:L.cuda_graph.pairs.map(p=>`c${p.conc}: ${fmt(p.speedup,2)}× (${fmt0(p.graph)} vs ${fmt0(p.no_graph)})`).join('  ·  ')}),
    ]));
  }
  if((L.mtp||[]).length){
    const t=el('table'); t.appendChild(el('tr',{},['conc','MTP-off','MTP-on','Δ%'].map((h,i)=>el('th',{class:i?'num':'',text:h}))));
    L.mtp.forEach(m=>t.appendChild(el('tr',{},[el('td',{text:'MTP'}),el('td',{class:'num',text:fmt0(m.mtp_off)}),
      el('td',{class:'num',text:fmt0(m.mtp_on)}),
      el('td',{class:'num',html:`<span style="color:${m.delta_pct<0?'var(--red)':'var(--green)'}">${m.delta_pct>0?'+':''}${fmt(m.delta_pct,1)}%</span>`})])));
    // fix first column to show conc
    [...t.querySelectorAll('tr')].slice(1).forEach((tr,i)=>tr.firstChild.textContent='c'+L.mtp[i].conc);
    s.appendChild(el('div',{class:'card',style:'margin-bottom:10px'},[el('h3',{text:'MTP (speculative decode)'}),t]));
  }
  if((L.all_reduce||[]).length){
    s.appendChild(el('div',{class:'card',style:'margin-bottom:10px'},[el('h3',{text:'Fused all-reduce'}),
      el('p',{class:'muted',text:L.all_reduce.map(a=>`c${a.conc}: ${a.delta_pct>0?'+':''}${fmt(a.delta_pct,1)}% without`).join('  ·  ')})]));
  }
  if((L.ceiling||[]).length){
    s.appendChild(el('div',{class:'warn',text:'Ceiling (noop-op) numbers are single-run and noisy — directional only.'}));
    const t=el('table'); t.appendChild(el('tr',{},['op','conc','baseline','noop','apparent share'].map((h,i)=>el('th',{class:i>1?'num':'',text:h}))));
    L.ceiling.forEach(c=>t.appendChild(el('tr',{},[el('td',{text:c.op}),el('td',{class:'num',text:'c'+c.conc}),
      el('td',{class:'num',text:fmt0(c.baseline)}),el('td',{class:'num',text:fmt0(c.noop)}),
      el('td',{class:'num',text:fmt(c.apparent_share_pct,1)+'%'})])));
    s.appendChild(el('div',{class:'card'},[t]));
  }
})();

// ===================== HEALTH =====================
(function(){
  const h=D.health||{}; const s=section('health','Artifact health','what is present, what is junk');
  const g=el('div',{class:'grid cards'});
  const counts=[['torch traces',h.torch_traces],['nsys binaries',h.nsys_rep_binaries],
    ['nsys kernsum exports',h.nsys_kernsum_exports],['ncu binaries',h.ncu_rep_binaries],
    ['ncu captures parsed',h.ncu_captures_parsed],['e2e rows',h.e2e_rows]];
  counts.forEach(([k,v])=>g.appendChild(el('div',{class:'card'},[el('h3',{text:fmt0(v)}),el('p',{class:'muted',text:k})])));
  s.appendChild(g);
  if((h.ncu_all_nan_captures||[]).length)
    s.appendChild(el('div',{class:'warn',text:'All-NaN ncu captures (excluded): '+h.ncu_all_nan_captures.join(', ')}));
  if((h.bogus_summary_exports||[]).length)
    s.appendChild(el('div',{class:'warn',text:'Bogus _summary.txt (==ERROR==, ignored): '+h.bogus_summary_exports.join(', ')}));
  (h.notes||[]).forEach(n=>s.appendChild(el('div',{class:'note muted',text:'• '+n})));
  (F.data_quality||[]).forEach(n=>s.appendChild(el('div',{class:'note muted',text:'• '+n})));
})();

// ---------- helpers that need findings thresholds ----------
function boundOf(k){
  const T=F.thresholds||{}; const comp=k.comp,mem=Math.max(k.mem||0,k.dram||0);
  if(k.cluster)return{type:'cluster',text:'vendor cluster-dispatch kernel — structurally un-fusable'};
  if(comp==null||k.mem==null)return{type:'unknown',text:'no valid metrics'};
  if(mem>=T.MEM_BOUND_PCT&&mem-comp>T.DOMINANCE_GAP)return{type:'memory',text:`memory/BW-bound (${fmt(mem,0)}% vs ${fmt(comp,0)}%) — vendor floor; fuse / fewer bytes / bigger batch`};
  if(comp>=T.COMPUTE_BOUND_PCT&&comp-mem>T.DOMINANCE_GAP)return{type:'compute',text:(k.occ!=null&&k.occ<20&&!k.clc)?`compute ${fmt(comp,0)}% but low occ ${fmt(k.occ,0)}% — occupancy-limited, uncertain`:`compute-bound (${fmt(comp,0)}%) — near peak, don't rewrite`};
  if(Math.max(comp,mem)<T.LATENCY_CEIL)return k.clc?{type:'latency',text:`low util ${fmt(Math.max(comp,mem),0)}% but CLC corrupts occupancy — verify before trusting a fuse win`}:{type:'latency',text:`latency/occupancy-bound (peak ${fmt(Math.max(comp,mem),0)}%, waves ${fmt(k.waves,2)}) — FUSE`};
  return{type:'mixed',text:`mixed (comp ${fmt(comp,0)} / mem ${fmt(mem,0)})`};
}
function boundCat(cat){ // color kernel-explorer categories by their canonical verdict if known
  const e=(F.decode_canonical?.categories||[]).find(x=>x.cat===cat);
  return e?BOUND_COLOR[e.bound_type]:'gray';
}
function legend(items){const l=el('div',{class:'legend'});
  items.forEach(([lab,c])=>l.appendChild(el('span',{},[el('span',{class:'swatch',style:`background:${c}`}),lab])));return l;}

// ---------- build nav ----------
const nav=document.getElementById('nav');
SECTIONS.forEach(([id,title])=>nav.appendChild(el('a',{href:'#'+id,text:title})));
</script>
